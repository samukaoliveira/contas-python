<!-- MODAL -->
<div id="modalLancamento" class="modal">
    <div class="modal-content">
        <header class="modal-header">
            <h2 id="modalTitulo">Novo lançamento</h2>
            <button class="close-btn" onclick="closeModal()">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </header>

        <form method="post" id="formLancamento"
              action="{% if cartao %}
                        {% url form_action cartao.id %}
                      {% else %}
                        {% url form_action %}
                      {% endif %}">
            
            {% csrf_token %}

            <!-- ID (usado no update) -->
            <input type="hidden" name="id" id="lancamentoId">
            <input type="hidden" name="next" value="{{ request.get_full_path }}">

            <!-- FATURA -->
            <input type="hidden" name="fatura" value="{{ fatura.id }}">

            <div class="form-group">
                <label>Descrição</label>
                <input type="text" name="descricao" id="descricao" required>
            </div>

            <div class="form-group">
                <label>Valor</label>
                <input type="number" step="0.01" name="valor" id="valor" required>
            </div>

            <div class="form-group">
                <label>Data</label>
                <input type="date" name="data" id="data" required>
            </div>

            <div class="form-group">
                <label>Natureza</label>
                <select name="natureza" id="natureza">
                    <option value="RECEITA">Receita</option>
                    <option value="DESPESA">Despesa</option>
                </select>
            </div>

            <div class="form-group">
                <label>Repetição</label>
                <select name="fixo" id="fixo" >
                    <option value="NAO">Não</option>
                    <option value="FIXO">Fixo</option>
                    <option value="PARCELADO">Parcelado</option>
                </select>
            </div>

            <!-- PARCELAS -->
            <div class="form-group" id="grupoParcelas" style="display:none;">
                <label>Parcelas</label>
                <input type="number" name="parcelas" id="parcelas">
            </div>

            <!-- ESCOPO UPDATE -->
            <div class="form-group" id="grupoEscopo" style="display:none;">
                <label>Aplicar alteração</label>
                <select name="escopo_update" id="escopo_update">
                    <option value="um">Somente este lançamento</option>
                    <option value="todos">Este e próximos</option>
                </select>
            </div>

            <div class="form-group checkbox">
                <label>Já pago</label>
                <input type="checkbox" name="pago" id="pago">
            </div>

            <footer class="modal-footer">
                <button type="button" class="btn-secondary" onclick="closeModal()">
                    Cancelar
                </button>
                <button type="submit" class="btn-primary">
                    Salvar
                </button>
            </footer>
        </form>
    </div>
</div>
